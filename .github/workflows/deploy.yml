name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/icon-change-block-combos-mci4or]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: app/linyappcraft
        run: npm install --legacy-peer-deps
      - name: Build
        working-directory: app/linyappcraft
        run: npx vite build
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/linyappcraft/dist
      - id: deployment
        uses: actions/deploy-pages@v4
